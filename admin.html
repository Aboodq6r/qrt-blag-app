<!DOCTYPE html><html><head><title>QRT Admin</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#991b1b">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="QRT">
<link rel="apple-touch-icon" href="icon-180.png"><link rel="stylesheet" href="style.css"></head><body><div class="app"><header><div><h1 data-t="title">Qatar Rescue Team</h1><p data-t="subtitle">Field rescue reporting and dispatch system</p></div><div class="top-actions"><button class="small black" onclick="setLang('ar')">عربي</button><button class="small black" onclick="setLang('en')">English</button><button class="small gray" onclick="logout()" data-t="logout">Logout</button><span class="badge">QRT</span></div></header><nav class="nav"><a href="reporter.html" data-t="reporter">Reporter</a><a href="team.html" data-t="team">Team</a><a href="admin.html" data-t="admin">Admin</a><a href="location.html" data-t="location">Location</a></nav>
<section class="card"><h2 data-t="adminPanel">Admin Panel</h2><p class="note">Manage rescue teams, assign البلاغات, and review logs.</p></section>
<div class="grid"><section class="card"><h2 data-t="addTeam">Add Team</h2><form id="teamForm">
<label>Team Name</label><input id="teamName" required><label>Leader</label><input id="leader" required><label>Phone</label><input id="teamPhone" required>
<label>Vehicle</label><input id="teamVehicle" required><label>Area</label><input id="teamArea" required>
<label>Status</label><select id="teamStatus"><option>Available</option><option>Busy</option><option>Offline</option></select><button class="green" type="submit">Add Team</button></form></section>
<section class="card"><h2>Teams / الفرق</h2><div id="teamsList"></div></section></div>
<section class="card"><h2 data-t="reports">Reports</h2><div class="stats"><div><strong id="totalCount">0</strong><span>Total</span></div><div><strong id="newCount">0</strong><span>New</span></div><div><strong id="assignedCount">0</strong><span>Assigned</span></div><div><strong id="closedCount">0</strong><span>Closed</span></div></div><div id="reportsList"></div></section>
<section class="card"><h2 data-t="logs">Logs</h2><div id="logsList"></div></section></div><script src="script.js"></script></body></html>
